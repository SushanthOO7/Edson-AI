services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: edson_it_ai
      POSTGRES_USER: edson_it_ai
      POSTGRES_PASSWORD: edson_it_ai
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
